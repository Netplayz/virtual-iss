# NATS Server Configuration for Virtual ISS
port: 4222
http_port: 8222

jetstream: {
  store_dir: "/data/jetstream"
  max_memory_store: 256MB
  max_file_store: 10GB
}

accounts: {
  ISS: {
    users: [
      { user: "dynamics", password: "iss_dyn" },
      { user: "gnc", password: "iss_gnc" },
      { user: "eps", password: "iss_eps" },
      { user: "eclss", password: "iss_eclss" },
      { user: "thermal", password: "iss_thrm" },
      { user: "comms", password: "iss_com" },
      { user: "cdh", password: "iss_cdh" },
      { user: "crew", password: "iss_crew" },
      { user: "nas", password: "iss_nas" },
      { user: "mcp", password: "iss_mcp" },
      { user: "orchestrator", password: "iss_orch" },
      { user: "dashboard", password: "iss_dash" },
    ]
    jetstream: enabled
  }
}

# Subject permissions per subsystem
accounts: {
  ISS: {
    exports: [
      # Telemetry subjects (readable by all)
      { stream: "telemetry.>" },
      { stream: "command.>" },
      { stream: "state.>" },
      { stream: "event.>" },
      { stream: "nas.>" },
      { stream: "mcp.>" },
    ]
    imports: [
      { service: { subject: "command.uplink" } },
      { service: { subject: "command.downlink" } },
    ]
  }
}
